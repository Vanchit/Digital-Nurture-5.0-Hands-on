# ===================================================
# Spring Framework and Application Log Levels
# ===================================================
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# ===================================================
# Hibernate SQL logs (shows executed queries and bindings)
# ===================================================
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# ===================================================
# Log Pattern
# ===================================================
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# ===================================================
# MySQL Database Configuration
# ===================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=root

# ===================================================
# Hibernate / JPA Configuration
# ===================================================
# validate - checks table/column existence, throws error if not found
# create   - drops and recreates tables on startup
# update   - creates missing tables/columns without dropping existing data
# create-drop - creates tables, drops them when context closes
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
